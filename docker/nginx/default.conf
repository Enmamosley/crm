server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;
    charset utf-8;

    client_max_body_size 20M;

    # ── Static assets: JS, CSS, fonts — served directly with long cache ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── User-uploaded files via Laravel storage ──────────────────────────
    # ^~ ensures this prefix match beats the regex block above for /storage/ paths
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 1d;
        access_log off;
        add_header Cache-Control "public";
    }

    # ── Main application entry point ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # ── Block access to hidden files (.env, .git, etc.) ──────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/crm_access.log;
    error_log  /var/log/nginx/crm_error.log warn;
}
